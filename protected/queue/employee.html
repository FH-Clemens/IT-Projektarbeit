<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Employee - Status Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
<div id="main-content">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0">Manage Queue Status</h1>
        <button id="logout-btn" class="btn btn-danger">Abmelden</button>
    </div>
        <div id="queue-status-list" class="list-group">
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

    const socket = io();

    async function  fetchQueue() {
        const res = await fetch('/api/queue/get-queue');
        const data = await res.json();
        const list = document.getElementById('queue-status-list');
        list.innerHTML = "";

        data.queue.forEach(item => {
            const itemDiv = document.createElement('div');
            itemDiv.className = "list-group-item d-flex justify-content-between align-items-center shadow-sm mb-2";
            itemDiv.innerHTML = `
                    <div>
                        <strong>Nummer ${item.queueNumber}</strong>
                        <span class="badge bg-secondary ms-2">${item.status || 'wartend'}</span>
                        <div id="error-${item.queueNumber}" class="text-danger mt-1 small"></div>
                    </div>
                    <input type="text"
                    id="servicepoint-${item.queueNumber}"
                   class="form-control form-control-sm mb-2"
                    placeholder="Servicepunkt (z.B. Schalter 1)"
                    value="${item.servicePoint || ''}">
                    <select class="form-select w-25" onchange="updateStatus(${item.queueNumber}, this.value)">
                        <option value="wartend" ${item.status === 'wartend' ? 'selected' : ''}>wartend</option>
                        <option value="in Bearbeitung" ${item.status === 'in Bearbeitung' ? 'selected' : ''}>in Bearbeitung</option>
                        <option value="abgeschlossen" ${item.status === 'abgeschlossen' ? 'selected' : ''}>abgeschlossen</option>
                    </select>
                `;
            list.appendChild(itemDiv);
        });
    }

    async function updateStatus(num, newStatus) {

        const csrfEntry = await cookieStore.get('csrf_token');
        const servicePointValue = document.getElementById(`servicepoint-${num}`)?.value || "";

        const errorDiv = document.getElementById(`error-${num}`);
        errorDiv.innerHTML = ``;


        const response = await fetch('/api/queue/update-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRF-TOKEN': csrfEntry.value },
                body: JSON.stringify({
                    queueNumber: num,
                    status: newStatus,
                    servicePoint: servicePointValue     // Servicepunkt an das Backend übertragen
                })
            });

        const result = await response.json();
        if(!result.success){
            errorDiv.textContent = "Bereit von anderem Schalter reserviert";
        }
    }

    // realtime listener stat alle 5 Sekunden refreshen
    socket.on("queueChanged", () => {
        fetchQueue();
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
    if (confirm('Möchtest du dich wirklich abmelden?')) {
        try {
            const response = await fetch('/api/auth/logout', { method: 'POST' });
            if (response.ok) window.location.href = '/login.html';
        } catch (error) { console.error(error); }
    }
});
    fetchQueue();

</script>
</body>
</html>
