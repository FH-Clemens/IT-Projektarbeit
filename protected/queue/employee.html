<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Employee - Status Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

<main id="main-content">

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="m-0">Manage Queue Status</h1>
            <button id="logout-btn" class="btn btn-danger">Abmelden</button>
        </div>

        <div class="row">
            <div id="queue-waiting-list" class="list-group col"></div>
            <div id="queue-completed-list" class="list-group col"></div>
        </div>

    </div>
</main>

<script src="/socket.io/socket.io.js"></script>

<script>

    const socket = io();
    const waitingColId = 'queue-waiting-list';
    const completedColId = 'queue-completed-list';

    const statusDone = 'abgeschlossen';
    const statusWaiting = 'wartend';
    const statusProcessing = 'in Bearbeitung';

    function createEntryCard(item) {
        const itemDiv = document.createElement('div');

        itemDiv.className = "list-group-item d-flex justify-content-between align-items-center shadow-sm mb-2";

        const headerDiv = document.createElement('div');
        itemDiv.appendChild(headerDiv);

        const nameStrong = document.createElement('strong');
        headerDiv.appendChild(nameStrong);

        nameStrong.textContent = `Nummer ${item.queueNumber}`;

        const statusSpan = document.createElement('span');
        headerDiv.appendChild(statusSpan);

        statusSpan.classList.add('badge', 'bg-secondary', 'ms-2');
        statusSpan.textContent = item.status || 'wartend';

        const errorSpan = document.createElement('span');
        headerDiv.appendChild(errorSpan);

        errorSpan.id = `error-${item.queueNumber}`;
        errorSpan.classList.add('text-danger', 'mt-1', 'small');
        errorSpan.textContent = '';

        const servicePointInput = document.createElement('input');
        itemDiv.appendChild(servicePointInput);

        servicePointInput.id = `servicepoint-${item.queueNumber}`;
        servicePointInput.type = 'text';
        servicePointInput.classList.add('form-control', 'form-control-sm', 'mb-2');
        servicePointInput.placeholder = 'Servicepunkt (z.B. Schalter 1)';
        servicePointInput.value = item.servicePoint || '';

        const statusSelect = document.createElement('select');
        itemDiv.appendChild(statusSelect);

        statusSelect.addEventListener('change', () => updateStatus(item.queueNumber, statusSelect.value));

        [statusWaiting, statusProcessing, statusDone].forEach(status => {
            const option = document.createElement('option');
            statusSelect.appendChild(option);

            option.value = status;

            if (item.status === status) {
                option.selected = true;
            }

            option.textContent = status;
        })

        return itemDiv;
    }

    async function fetchQueue() {

        const res = await fetch('/api/queue/get-queue');
        const data = await res.json();

        const waitingCol = document.getElementById(waitingColId);
        waitingCol.innerHTML = "";

        const completedCol = document.getElementById(completedColId);
        completedCol.innerHTML = "";

        const waiting = [];
        const completed = [];

        data.queue.forEach(item => {
            if (item.status === statusDone) {
                completed.push(item);
            } else {
                waiting.push(item);
            }
        });

        waitingCol.append(...waiting.map(createEntryCard));
        completedCol.append(...completed.reverse().map(createEntryCard));
    }

    async function updateStatus(num, newStatus) {

        const csrfEntry = await cookieStore.get('csrf_token') ?? null;
        if (csrfEntry === null) throw new Error('Failed to fetch CSRF token');

        const servicePointValue = document.getElementById(`servicepoint-${num}`)?.value || "";

        const errorDiv = document.getElementById(`error-${num}`);
        errorDiv.innerHTML = ``;

        const response = await fetch('/api/queue/update-status', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRF-TOKEN': csrfEntry.value},
            body: JSON.stringify({
                queueNumber: num,
                status: newStatus,
                servicePoint: servicePointValue     // Servicepunkt an das Backend übertragen
            })
        });

        if (!response.ok) {
            errorDiv.textContent = "Bereits von anderem Schalter reserviert";
        }
    }

    // realtime listener stat alle 5 Sekunden refreshen
    socket.on("queueChanged", () => {
        fetchQueue();
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
        if (confirm('Möchtest du dich wirklich abmelden?')) {
            try {
                const response = await fetch('/api/auth/logout', {method: 'POST'});
                if (response.ok) window.location.href = '/login.html';
            } catch (error) {
                console.error(error);
            }
        }
    });
    fetchQueue();

</script>
</body>
</html>
