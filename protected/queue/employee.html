<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Employee - Status Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
<div id="main-content">
    <div class="container">
        <h1 class="mb-4">Manage Queue Status</h1>
        <div id="queue-status-list" class="list-group">
        </div>
    </div>
</div>

<script>

    async function fetchQueue() {
        const res = await fetch('/api/queue/get-queue');
        const data = await res.json();
        const list = document.getElementById('queue-status-list');
        list.innerHTML = "";

        data.queue.forEach(item => {
            const itemDiv = document.createElement('div');
            itemDiv.className = "list-group-item d-flex justify-content-between align-items-center shadow-sm mb-2";
            itemDiv.innerHTML = `
                <div>
                    <strong>Nummer ${item.queueNumber}</strong>
                    <span class="badge bg-secondary ms-2">${item.status || 'wartend'}</span>
                </div>
                <select class="form-select w-25" onchange="updateStatus(${item.queueNumber}, this.value)">
                    <option value="wartend" ${item.status === 'wartend' ? 'selected' : ''}>wartend</option>
                    <option value="in Bearbeitung" ${item.status === 'in Bearbeitung' ? 'selected' : ''}>in Bearbeitung</option>
                    <option value="abgeschlossen" ${item.status === 'abgeschlossen' ? 'selected' : ''}>abgeschlossen</option>
                </select>
        `;
            list.appendChild(itemDiv);
        });
    }

    async function updateStatus(num, newStatus) {

        const csrfEntry = await cookieStore.get('csrf_token');

        await fetch('/api/queue/update-status', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRF-TOKEN': csrfEntry.value },
            body: JSON.stringify({queueNumber: num, status: newStatus})
        });

        fetchQueue(); // Liste aktualisieren
    }

    fetchQueue();
    setInterval(fetchQueue, 5000); // Alle 5 Sekunden refreshen
</script>
</body>
</html>
