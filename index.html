<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Queue Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

    <body>
        <div class="container">

            <h1 class="text-center mt-4">Queue System</h1>

            <div class="row mt-4">

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card p-3 text-center">
                        <button id="enter-queue-button" class="btn btn-primary">
                            Take Number
                        </button>

                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card p-3 text-center">
                        <h5 class="card-title">Your Number</h5>
                        <div class="card-body">
                            <span id="user-number"></span>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-12 col-lg-4">
                    <div class="card p-3 text-center">
                        <h5 class="card-title">Queue List</h5>
                        <div class="card-body">
                            <ul id="queue-render" class="list-group"></ul>
                        </div>
                    </div>
                </div>

            </div>

            <script src="script.js" type="module"></script>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </body>
</html>
