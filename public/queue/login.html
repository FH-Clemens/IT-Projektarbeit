<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdeliver.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title> Employee Login</title>
</head>

<body class="bg-light p-4">
<div id="login-area" class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 400px;">
        <h3>Employee Login</h3>
        <p class="text-muted">Please sign in to continue</p>
        <hr>
        <div class="mb-3">
            <label for="login-user">Username</label>
            <input type="text" id="login-user" class="form-control">
        </div>
        <div class="mb-3">
            <label for="login-pass">Password</label>
            <input type="password" id="login-pass" class="form-control">
        </div>
        <input type="hidden" id="csrf-field">
        <button onclick="performLogin()" class="btn btn-primary w-100">Login</button>
        <div id="error-msg" class="text-danger mt-2" style="display:none;">Please fill in all fields!</div>
    </div>
</div>
<script>
    async function fetchCsrf() {
        try {
            const res = await fetch('/api/auth/csrf-token');
            const data = await res.json();
            document.getElementById('csrf-field').value = data.token;
        } catch (e) { console.error("CSRF Error"); }
    }

    async function performLogin() {
        const u = document.getElementById('login-user').value;
        const p = document.getElementById('login-pass').value;
        const csrf = document.getElementById('csrf-field').value;

        if (!u || !p) {
            document.getElementById('error-msg').style.display = 'block';
            return;
        }

        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-Token': csrf
            },
            body: JSON.stringify({ username: u, password: p })
        });

        if (res.ok) {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            await fetchQueue();
            setInterval(fetchQueue, 5000);
        } else {
            alert("Login failed! Please check your credentials.");
        }
    }
    fetchCsrf()
</script>
</body>
</html>
