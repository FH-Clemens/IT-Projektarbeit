<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Employee - Status Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
<div id="login-area" class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 400px;">
        <h3>Employee Login</h3>
        <hr>
        <div class="mb-3">
            <label for="login-user">Username</label>
            <input type="text" id="login-user" class="form-control">
        </div>
        <div class="mb-3">
            <label for="login-pass">Password</label>
            <input type="password" id="login-pass" class="form-control">
        </div>
        <input type="hidden" id="csrf-field">
        <button onclick="performLogin()" class="btn btn-primary w-100">Login</button>
        <div id="error-msg" class="text-danger mt-2" style="display:none;">Please fill in all fields!</div>
    </div>
</div>
<div id="main-content" style="display:none;">
    <div class="container">
        <h1 class="mb-4">Manage Queue Status</h1>
        <div id="queue-status-list" class="list-group">
            </div>
    </div>
</div>
      <script>
        async function fetchCsrf() {
            try {
                const res = await fetch('/api/auth/csrf-token');
                const data = await res.json();
                document.getElementById('csrf-field').value = data.token;
            } catch (e) { console.error("CSRF Error"); }
        }

        async function performLogin() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            const csrf = document.getElementById('csrf-field').value;

            if (!u || !p) {
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': csrf
                },
                body: JSON.stringify({ username: u, password: p })
            });

            if (res.ok) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
               await fetchQueue();
                setInterval(fetchQueue, 5000);
            } else {
                alert("Login failed! Please check your credentials.");
            }
        }

        // Initialer Aufruf
        fetchCsrf();
        async function  fetchQueue() {
            const res = await fetch('/api/queue/get-queue');
            const data = await res.json();
            const list = document.getElementById('queue-status-list');
            list.innerHTML = "";

            data.queue.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "list-group-item d-flex justify-content-between align-items-center shadow-sm mb-2";
                itemDiv.innerHTML = `
                    <div>
                        <strong>Nummer ${item.queueNumber}</strong>
                        <span class="badge bg-secondary ms-2">${item.status || 'wartend'}</span>
                    </div>
                    <select class="form-select w-25" onchange="updateStatus(${item.queueNumber}, this.value)">
                        <option value="wartend" ${item.status === 'wartend' ? 'selected' : ''}>wartend</option>
                        <option value="in Bearbeitung" ${item.status === 'in Bearbeitung' ? 'selected' : ''}>in Bearbeitung</option>
                        <option value="abgeschlossen" ${item.status === 'abgeschlossen' ? 'selected' : ''}>abgeschlossen</option>
                    </select>
                `;
                list.appendChild(itemDiv);
            });
        }

        async function updateStatus(num, newStatus) {
            await fetch('/api/queue/update-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ queueNumber: num, status: newStatus })
            });
            fetchQueue(); // Liste aktualisieren
        }

        fetchQueue();
        setInterval(fetchQueue, 5000); // Alle 5 Sekunden refreshen
    </script>
</body>
</html>
